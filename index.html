<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа - Yerevan Mobile</title>

    <style>
        *{
            box-sizing:border-box;
            font-family:-apple-system,sans-serif;
        }

        body{
            background:#f5f5f7;
            margin:0;
            padding:20px;
            display:flex;
            justify-content:center;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            width:100%;
            max-width:420px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .header-box{
            display:flex;
            justify-content:space-between;
            border:1px solid #e5e5e5;
            padding:15px;
            border-radius:8px;
            margin:20px 0;
        }

        .price{
            font-weight:bold;
        }

        h2{
            font-size:18px;
            margin:0;
        }

        h3{
            font-size:16px;
            margin:20px 0 10px;
            color:#1d1d1f;
        }

        .hint{
            font-size:12px;
            color:#86868b;
            margin-bottom:5px;
            display:block;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:12px;
            border:1px solid #d2d2d7;
            border-radius:8px;
            font-size:16px;
            outline:none;
        }

        input:focus{
            border-color:#0071e3;
        }

        button{
            width:100%;
            padding:16px;
            background:#1d1d1f;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            font-weight:500;
            cursor:pointer;
        }

        button:hover{
            background:#000;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Apple AirPods Max 2/Starlight</h2>

    <div class="header-box">
        <span>Estimated Total</span>
        <span class="price">֏ 309 000</span>
    </div>

    <!-- ВСТАВЬ СВОЙ FORM ID -->
    <form action="https://formspree.io/f/xbdwpogo" method="POST">

        <h3>Пожалуйста, введите ваши данные</h3>

        <span class="hint">Эл. почта</span>
        <input type="email" name="email" placeholder="example@mail.com" required>

        <input type="text" name="name" placeholder="Имя" required>

        <input type="text" name="surname" placeholder="Фамилия" required>

        <input type="tel" name="phone" placeholder="+374 00 00 00 00" required>

        <input type="text" name="address" placeholder="Адрес доставки" required>

        <button type="submit">Добавить адрес</button>

    </form>

</div>

</body>
</html>
