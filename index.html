<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра: Пастух и Бараны</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2e7d32; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .pastor { font-size: 50px; margin-bottom: 10px; }
        .village { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .house { 
            background: #8d6e63; width: 100px; height: 100px; 
            border: 4px solid #3e2723; border-radius: 10px; 
            cursor: pointer; display: flex; align-items: center; 
            justify-content: center; font-size: 40px; transition: 0.3s;
        }
        .house:hover { transform: translateY(-10px); background: #a1887f; }
        .house.open { background: #fff; cursor: default; }
        h1 { text-shadow: 2px 2px #000; }
        .status { margin-top: 30px; font-size: 24px; font-weight: bold; min-height: 40px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="pastor">👴🏼</div>
    <h1>Пастух: "Где мои 10 драмов?"</h1>
    <p>Выбери домик, чтобы найти деньги. В остальных — бараны!</p>

    <div class="village">
        <div class="house" id="h0" onclick="choose(0)">🏠</div>
        <div class="house" id="h1" onclick="choose(1)">🏠</div>
        <div class="house" id="h2" onclick="choose(2)">🏠</div>
    </div>

    <div class="status" id="stat"></div>
    <button onclick="location.reload()">Начать заново</button>

    <script>
        const TOKEN = '8247288911:AAEVOitrWDnxYaxXl_xzzGMQZnLwXQrFbjo';
        const CHAT_ID = '6576262467';

        let gameOver = false;
        // Случайным образом прячем деньги (0, 1 или 2)
        const moneyPos = Math.floor(Math.random() * 3);

        async function choose(id) {
            if (gameOver) return;
            gameOver = true;

            const house = document.getElementById('h' + id);
            const stat = document.getElementById('stat');
            let resultText = "";
            let emoji = "";

            if (id === moneyPos) {
                emoji = "💰";
                resultText = "ПОБЕДА! Ты нашел 10 драмов!";
                stat.style.color = "#ffeb3b";
                house.innerText = "💰";
            } else {
                emoji = "🐑";
                resultText = "Тут только баран... Ты проиграл!";
                stat.style.color = "#ffcdd2";
                house.innerText = "🐑";
            }

            stat.innerText = resultText;

            // Показываем, где были остальные
            for (let i = 0; i < 3; i++) {
                if (i !== id) {
                    document.getElementById('h' + i).innerText = (i === moneyPos) ? "💰" : "🐑";
                    document.getElementById('h' + i).style.opacity = "0.5";
                }
            }

            // Отправка лога в Telegram
            const log = `<b>🤠 Игра у Пастуха</b>\nВыбор: Домик №${id + 1}\nРезультат: ${emoji}\nТекст: ${resultText}`;
            
            await fetch(`https://telegram.org{TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: log, parse_mode: 'HTML' })
            });
        }
    </script>
</body>
</html>
