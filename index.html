<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f7f6;
        }

        /* Главный контейнер (Рабочая область) */
        #main-content {
            position: absolute;
            top: 0;
            bottom: 50px; /* Оставляем место для панели задач */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Нижняя панель задач */
        #taskbar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: #23697c; /* Фирменный цвет из твоего кода */
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            color: white;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
        }

        .task-item {
            padding: 5px 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .task-item:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Экран загрузки */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loader-box {
            border: 1px solid #68b92e;
            padding: 20px;
            background: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Экран загрузки (исчезнет через 2 секунды) -->
    <div id="loading-overlay">
        <div class="loader-box">
            <div style="color:#23697c; font-weight: bold;">Loading, please wait...</div>
        </div>
    </div>

    <!-- Основной контент -->
    <div id="main-content">
        <h1>Добро пожаловать в систему</h1>
    </div>

    <!-- Панель задач -->
    <div id="taskbar">
        <div class="task-item">Главная</div>
    </div>

    <script>
        // Простая имитация скрытия загрузки
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
            }, 1500);
        };
    </script>
</body>
</html>
