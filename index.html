<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmeriaBank - Internet Bank</title>
    <style>
        /* Основные стили страницы */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Tahoma, Arial, sans-serif;
            background-color: #ffffff;
        }

        /* Рабочая область */
        #VWG_Body {
            position: absolute;
            width: 100%;
            top: 0;
            bottom: 50px; /* Оставляем место под панель */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Нижняя панель (как в оригинале) */
        #VWG_TaskBar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background-color: #f0f0f0;
            border-top: 1px solid #d0d0d0;
            display: flex;
            align-items: center;
            padding-left: 10px;
            box-sizing: border-box;
        }

        /* Кнопка на панели задач */
        .taskbar-item {
            height: 34px;
            padding: 0 15px;
            background: #e1e1e1;
            border: 1px solid #bcbcbc;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #333;
            cursor: pointer;
        }

        /* Экран загрузки (исчезнет сам) */
        #VWG_LoadingScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loading-box {
            width: 250px;
            padding: 20px;
            border: 1px solid #68b92e;
            background-color: #f9f9f9;
            text-align: center;
        }

        .loading-text {
            margin-top: 10px;
            color: #23697c;
            font-weight: bold;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="VWG_LoadingScreen">
        <div class="loading-box">
            <!-- Имитация полоски загрузки -->
            <div style="height: 10px; background: #eee; border-radius: 5px; overflow: hidden;">
                <div id="progress" style="width: 0%; height: 100%; background: #68b92e; transition: width 1s;"></div>
            </div>
            <div class="loading-text">Loading, please wait ...</div>
        </div>
    </div>

    <!-- Основной контент -->
    <div id="VWG_Body">
        <img src="https://ameriabank.am" 
             onerror="this.style.display='none'" alt="">
        <h2 style="color: #23697c;">AmeriaBank System</h2>
        <p>Система готова к работе.</p>
    </div>

    <!-- Нижняя панель -->
    <div id="VWG_TaskBar">
        <div class="taskbar-item">MainForm</div>
    </div>

    <script>
        // Скрипт для анимации и скрытия загрузки
        window.addEventListener('load', function() {
            const progress = document.getElementById('progress');
            const loader = document.getElementById('VWG_LoadingScreen');
            
            // Имитируем заполнение полоски
            setTimeout(() => { progress.style.width = '100%'; }, 100);
            
            // Скрываем экран через 1.5 секунды
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }, 1500);
        });
    </script>

</body>
</html>
