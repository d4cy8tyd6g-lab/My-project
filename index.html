<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AmeriaBank Online Loan</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container{
      width:100%;
      max-width:420px;
      background:#fff;
      padding:30px;
      border-radius:14px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
    }

    .logo h1{
      color:#1d7f5f;
      font-size:28px;
    }

    .title{
      text-align:center;
      margin-bottom:25px;
      font-size:22px;
      color:#222;
      font-weight:bold;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      margin-bottom:7px;
      color:#333;
      font-size:14px;
    }

    .input-group input{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:15px;
      outline:none;
    }

    .input-group input:focus{
      border-color:#1d7f5f;
    }

    .btn{
      width:100%;
      padding:15px;
      background:#1d7f5f;
      color:white;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#16684d;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      color:#888;
      font-size:13px;
    }

    .success{
      display:none;
      margin-top:15px;
      color:green;
      text-align:center;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    <h1>AmeriaBank</h1>
  </div>

  <div class="title">
    Online Loan Application
  </div>

  <form id="loanForm">

    <div class="input-group">
      <label>Full Name</label>
      <input type="text" name="name" required>
    </div>

    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" name="phone" required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div class="input-group">
      <label>Loan Amount</label>
      <input type="number" name="amount" required>
    </div>

    <button type="submit" class="btn">
      Submit Application
    </button>

    <div class="success" id="successMsg">
      Application submitted successfully!
    </div>

  </form>

  <div class="footer">
    © 2026 AmeriaBank CJSC
  </div>

</div>

<script>
  const form = document.getElementById("loanForm");
  const successMsg = document.getElementById("successMsg");

  form.addEventListener("submit", function(e){
    e.preventDefault();

    // Example submit simulation
    const data = new FormData(form);

    console.log({
      name: data.get("name"),
      phone: data.get("phone"),
      email: data.get("email"),
      amount: data.get("amount")
    });

    successMsg.style.display = "block";

    form.reset();
  });
</script>

</body>
</html>
