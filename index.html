<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telcell Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
}

.app{
width:390px;
height:844px;
background:#f6f6f6;
position:relative;
overflow:hidden;
}

.top{
display:flex;
align-items:center;
gap:18px;
padding:60px 24px 0;
}

.back{
font-size:34px;
font-weight:300;
color:#2f3c46;
cursor:pointer;
}

.title{
font-size:34px;
font-weight:700;
color:#2f3c46;
}

.center{
text-align:center;
margin-top:50px;
}

.center h2{
font-size:28px;
font-weight:700;
color:#2f3c46;
margin-bottom:14px;
}

.center p{
font-size:18px;
color:#7b8794;
line-height:1.4;
}

.form{
margin-top:60px;
padding:0 24px;
}

.label{
font-size:20px;
font-weight:700;
color:#2f3c46;
margin-bottom:14px;
}

.input{
width:100%;
height:72px;
background:#efefef;
border:none;
border-radius:24px;
padding:0 22px;
font-size:24px;
color:#2f3c46;
outline:none;
}

.input::placeholder{
color:#b4b4b4;
}

.example{
margin-top:16px;
font-size:18px;
color:#7d8590;
}

.warning{
display:flex;
align-items:flex-start;
gap:10px;
margin-top:28px;
}

.icon{
width:28px;
height:28px;
border:2px solid #ff6b57;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:#ff6b57;
flex-shrink:0;
}

.warningText{
font-size:17px;
line-height:1.4;
color:#7d8590;
max-width:290px;
}

.bottom{
position:absolute;
left:24px;
right:24px;
bottom:36px;
text-align:center;
}

.offer{
font-size:24px;
font-weight:700;
color:#ff6b57;
margin-bottom:10px;
}

.desc{
font-size:18px;
line-height:1.4;
color:#414b57;
margin-bottom:28px;
}

.button{
width:100%;
height:74px;
border:none;
border-radius:40px;
background:#f5d7cf;
font-size:28px;
font-weight:600;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
<div class="back">←</div>
<div class="title">Բարև</div>
</div>

<div class="center">
<h2>Մուտք</h2>
<p>Ստեղծիր հարթակ վարձումների համար</p>
</div>

<div class="form">

<div class="label">Քո հեռախոսահամարը</div>

<input class="input" type="text" placeholder="+374 (**) *** ***">

<div class="example">Օր.` 77XXXXXX</div>

<div class="warning">
<div class="icon">i</div>

<div class="warningText">
Հաստատման կոդը SMS-ով կուղարկվի տվյալ հեռախոսահամարին
</div>
</div>

</div>

<div class="bottom">

<div class="offer">Ծանոթանալ Օֆերտային</div>

<div class="desc">
Telcell Wallet մուտք գործելով` դու ընդունում ես օգտագործման կանոնները
</div>

<button class="button">Հաստատել</button>

</div>

</div>

</body>
</html>
