<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Online Loan Applications</title>

    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="Ameriabank CJSC" />

    <meta name="description"
        content="Ամերիաբանկ ՓԲԸ-ն ունիվերսալ բանկ է, որը մատուցում է կորպորատիվ, ներդրումային և մանրածախ բանկային ծառայություններ։" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h1 {
            color: #6c2bd9;
            font-size: 28px;
        }

        .logo p {
            color: #777;
            margin-top: 5px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #6c2bd9;
            box-shadow: 0 0 0 3px rgba(108,43,217,0.15);
        }

        button {
            background: #6c2bd9;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5820b3;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 13px;
        }

        .success {
            display: none;
            text-align: center;
            color: green;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>AmeriaBank</h1>
        <p>Online Loan Applications</p>
    </div>

    <form id="loanForm">

        <input type="text" id="fullname" placeholder="Full Name" required />

        <input type="tel" id="phone" placeholder="Phone Number" required />

        <input type="email" id="email" placeholder="Email Address" required />

        <input type="number" id="amount" placeholder="Loan Amount" required />

        <input type="text" id="passport" placeholder="Passport Number" required />

        <button type="submit">Submit Application</button>

    </form>

    <div class="success" id="successMsg">
        Application submitted successfully.
    </div>

    <div class="footer">
        © 2026 AmeriaBank CJSC
    </div>

</div>

<script>
    const form = document.getElementById("loanForm");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const data = {
            fullname: document.getElementById("fullname").value,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value,
            amount: document.getElementById("amount").value,
            passport: document.getElementById("passport").value
        };

        console.log("Loan Application:", data);

        successMsg.style.display = "block";

        form.reset();
    });
</script>

</body>
</html>
