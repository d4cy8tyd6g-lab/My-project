<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход • Meta</title>
    <style>
        /* Основные стили (CSS) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000; /* Черный фон как на скрине */
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 360px;
            margin-top: 40px;
            text-align: center;
        }

        .meta-logo {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Поля ввода */
        .input-field {
            width: 100%;
            background-color: #1c1c1c; /* Темно-серый фон инпутов */
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px 12px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .input-field:focus {
            border-color: #555;
        }

        .input-field::placeholder {
            color: #8e8e8e;
        }

        /* Кнопка Войти */
        .login-btn {
            width: 100%;
            background-color: #0064e0; /* Ярко-синий */
            color: white;
            border: none;
            border-radius: 25px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:active {
            opacity: 0.8;
        }

        /* Забыли пароль */
        .forgot-link {
            display: inline-block;
            margin-top: 20px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
        }

        /* Кнопка внизу */
        .footer {
            position: absolute;
            bottom: 30px;
            width: calc(100% - 40px);
            max-width: 360px;
        }

        .create-btn {
            width: 100%;
            background-color: transparent;
            color: #4c95ff;
            border: 1px solid #4c95ff;
            border-radius: 25px;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Заголовок имитирующий Meta -->
        <div class="meta-logo">
            <span>∞</span> Meta
        </div>
        
        <form action="#">
            <input type="text" class="input-field" placeholder="Имя пользователя, эл. адрес или мобильный телефон" value="ssaqlus">
            <input type="password" class="input-field" placeholder="Пароль">
            
            <button type="submit" class="login-btn">Войти</button>
        </form>

        <a href="#" class="forgot-link">Забыли пароль?</a>
    </div>

    <div class="footer">
        <a href="#" class="create-btn">Создать новый аккаунт</a>
    </div>

</body>
</html>
