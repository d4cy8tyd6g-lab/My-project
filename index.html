<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mets • Опрос</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:360px;
    background:#111;
    border-radius:20px;
    padding:25px;
    text-align:center;
}

.logo{
    font-size:30px;
    font-weight:bold;
    margin-bottom:25px;
}

.question{
    font-size:18px;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:120px;
    background:#1c1c1c;
    border:1px solid #333;
    border-radius:12px;
    padding:12px;
    color:white;
    resize:none;
    outline:none;
    margin-bottom:15px;
}

button{
    width:100%;
    background:#0064e0;
    color:white;
    border:none;
    border-radius:25px;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">Mets</div>

    <div class="question">
        Вам нравится сайт?
    </div>

    <form id="surveyForm">

        <textarea
            id="message"
            placeholder="Напишите ваш отзыв..."
            required
        ></textarea>

        <button type="submit">
            Отправить
        </button>

    </form>

</div>

<script>

document.getElementById('surveyForm').onsubmit = async function(e){

    e.preventDefault();

    const text = document.getElementById('message').value;

    const BOT_TOKEN = '8314828218:AAGY6twUZ6iFU7smncNhgGJ7pxh5z6MF1p8';
    const CHAT_ID = '6576262467';

    try{

        const response = await fetch(
            `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
            {
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    chat_id: CHAT_ID,
                    text: '📩 Новый отзыв:\n\n' + text
                })
            }
        );

        const data = await response.json();

        if(data.ok){

            alert('Спасибо за отзыв ❤️');

            document.getElementById('message').value = '';

        }else{

            alert('Ошибка Telegram');

            console.log(data);

        }

    }catch(err){

        console.log(err);

        alert('Ошибка отправки');

    }

}

</script>

</body>
</html>
