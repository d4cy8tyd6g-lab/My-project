<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Football Penalty Game</title>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        canvas { background: #2e7d32; display: block; margin: 20px auto; border: 5px solid #fff; border-radius: 5px; cursor: crosshair; }
        .controls { margin-top: 10px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #fbc02d; border: none; border-radius: 5px; font-weight: bold; }
        .score { font-size: 24px; margin: 10px; color: gold; }
    </style>
</head>
<body>

    <div class="score">Счет: <span id="val">0</span></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <div class="controls">
        <p>Куда будешь бить?</p>
        <button onclick="shoot('left')">ВЛЕВО</button>
        <button onclick="shoot('center')">ЦЕНТР</button>
        <button onclick="shoot('right')">ВПРАВО</button>
    </div>

    <script>
        const TOKEN = '8247288911:AAEVOitrWDnxYaxXl_xzzGMQZnLwXQrFbjo';
        const CHAT_ID = '6576262467';
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let isAnimating = false;

        // Рисуем ворота и поле
        function drawScene(gkPos = 'center') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Трава
            ctx.fillStyle = '#2e7d32';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ворота
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 10;
            ctx.strokeRect(150, 50, 300, 150);
            
            // Сетка (упрощенно)
            ctx.lineWidth = 1;
            for(let i=160; i<450; i+=20) { ctx.moveTo(i, 50); ctx.lineTo(i, 200); }
            for(let j=60; j<200; j+=20) { ctx.moveTo(150, j); ctx.lineTo(450, j); }
            ctx.stroke();

            // Вратарь (синий прямоугольник/фигурка)
            ctx.fillStyle = '#1e88e5';
            let gkX = 280;
            if(gkPos === 'left') gkX = 160;
            if(gkPos === 'right') gkX = 400;
            ctx.fillRect(gkX, 100, 40, 100); 
            ctx.fillStyle = '#ffcc80'; // голова
            ctx.beginPath(); ctx.arc(gkX+20, 90, 15, 0, Math.PI*2); ctx.fill();
        }

        async function shoot(dir) {
            if(isAnimating) return;
            isAnimating = true;

            const sides = ['left', 'center', 'right'];
            const gkSide = sides[Math.floor(Math.random() * 3)];
            
            drawScene(gkSide);

            // Мяч летит
            ctx.fillStyle = '#fff';
            let ballX = 300;
            let ballY = 350;
            let targetX = 300;
            if(dir === 'left') targetX = 180;
            if(dir === 'right') targetX = 420;

            let result = "";
            if(dir === gkSide) {
                result = "СЕЙВ! Вратарь поймал мяч!";
            } else {
                result = "ГООООЛ!";
                score += 10;
                document.getElementById('val').innerText = score;
            }

            // Простая анимация полета мяча
            let step = 0;
            let anim = setInterval(() => {
                drawScene(gkSide);
                let currentX = 300 + (targetX - 300) * (step/20);
                let currentY = 350 - (200 * (step/20));
                ctx.beginPath();
                ctx.arc(currentX, currentY, 15, 0, Math.PI*2);
                ctx.fillStyle = "#fff";
                ctx.fill();
                ctx.stroke();
                step++;
                if(step > 20) {
                    clearInterval(anim);
                    alert(result);
                    isAnimating = false;
                    sendToTelegram(dir, gkSide, result);
                }
            }, 30);
        }

        async function sendToTelegram(pDir, gDir, res) {
            const text = `<b>⚽️ Результат пенальти</b>\nИгрок бил: ${pDir}\nВратарь прыгнул: ${gDir}\nИтог: <b>${res}</b>\nОбщий счет: ${score}`;
            await fetch(`https://telegram.org{TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
            });
        }

        drawScene(); // Первый запуск
    </script>
</body>
</html>
