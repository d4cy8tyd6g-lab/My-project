<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Опрос • Mets</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:360px;
    background:#111;
    padding:25px;
    border-radius:18px;
    text-align:center;
}

.logo{
    font-size:28px;
    margin-bottom:25px;
    font-weight:bold;
}

.question{
    margin-bottom:20px;
    font-size:18px;
}

textarea{
    width:100%;
    height:100px;
    background:#1d1d1d;
    border:1px solid #333;
    border-radius:10px;
    color:#fff;
    padding:12px;
    resize:none;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:25px;
    background:#0064e0;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.success{
    margin-top:15px;
    color:#4cff88;
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">Mets</div>

    <div class="question">
        Вам нравится сайт?
    </div>

    <form id="surveyForm">

        <textarea
            id="message"
            placeholder="Напишите ваше мнение..."
            required
        ></textarea>

        <button type="submit">
            Отправить
        </button>

    </form>

    <div class="success" id="success">
        Спасибо за отзыв ❤️
    </div>

</div>

<script>
document.getElementById('surveyForm').onsubmit = function(e){

    e.preventDefault();

    const text = document.getElementById('message').value;

    console.log("Отзыв:", text);

    document.getElementById('success').style.display = 'block';

    document.getElementById('message').value = '';
};
</script>

</body>
</html>
