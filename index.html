<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mega Win Game</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 50px; }
        .game-card { background: #2a2a2a; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px gold; max-width: 400px; margin: 0 auto; }
        h1 { color: gold; }
        input { width: 80%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; font-size: 20px; text-align: center; }
        button { background: gold; color: #000; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
        button:hover { background: #ffd700; transform: scale(1.05); }
        .result { margin-top: 20px; font-size: 24px; font-weight: bold; min-height: 30px; }
    </style>
</head>
<body>

<div class="game-card">
    <h1>GOLDEN CHANCE</h1>
    <p>Угадай число от 1 до 10 и выиграй приз!</p>
    
    <input type="number" id="userGuess" placeholder="Введи число" min="1" max="10">
    <br>
    <button onclick="play()">ИСПЫТАТЬ УДАЧУ</button>

    <div class="result" id="res"></div>
</div>

<script>
const TOKEN = '8247288911:AAEVOitrWDnxYaxXl_xzzGMQZnLwXQrFbjo';
const CHAT_ID = '6576262467';

async function play() {
    const guess = document.getElementById('userGuess').value;
    const resDiv = document.getElementById('res');
    
    if (!guess || guess < 1 || guess > 10) {
        alert("Введи число от 1 до 10!");
        return;
    }

    // Логика: число 7 всегда выигрышное (или рандом)
    const winningNumber = 7; 
    let status = "";
    let prize = "";

    if (parseInt(guess) === winningNumber) {
        status = "🎉 ПОБЕДА!";
        prize = "1000 рублей";
        resDiv.style.color = "gold";
    } else {
        status = "❌ Попробуй еще раз";
        prize = "Ничего";
        resDiv.style.color = "red";
    }

    resDiv.innerText = status;

    // Отправка результата тебе в бот
    const text = `<b>🎰 Новая игра!</b>\nЧисло игрока: ${guess}\nРезультат: ${status}\nПриз: ${prize}`;
    
    await fetch(`https://telegram.org{TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
    });
}
</script>

</body>
</html>
