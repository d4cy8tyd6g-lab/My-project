<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ԼՈՏՈ</title>

<style>

body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial;
}

.ticket{
    position:relative;
    width:390px;
}

.ticket img{
    width:100%;
    display:block;
    border-radius:20px;
}

.scratch{
    position:absolute;
    background:silver;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
    border:2px solid #dcdcdc;
}

.scratch:active{
    transform:scale(.95);
}

.star{
    position:absolute;
    font-size:32px;
    color:gold;
    display:none;
    text-shadow:0 0 10px gold;
}

.result{
    position:absolute;
    bottom:85px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:32px;
    font-weight:bold;
    display:none;
    text-shadow:0 0 15px gold;
}

.wintext{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    color:#ffd700;
    font-size:20px;
    display:none;
}

/* ПЛЕНКИ */

.s1{top:215px;left:24px;width:63px;height:63px;}
.s2{top:215px;left:98px;width:63px;height:63px;}
.s3{top:215px;left:172px;width:63px;height:63px;}
.s4{top:215px;left:246px;width:63px;height:63px;}
.s5{top:215px;left:320px;width:63px;height:63px;}

.s6{top:290px;left:24px;width:63px;height:63px;}
.s7{top:290px;left:98px;width:63px;height:63px;}
.s8{top:290px;left:172px;width:63px;height:63px;}
.s9{top:290px;left:246px;width:63px;height:63px;}
.s10{top:290px;left:320px;width:63px;height:63px;}

/* ЗВЕЗДЫ */

#star1{top:228px;left:40px;}
#star2{top:228px;left:114px;}
#star3{top:228px;left:188px;}
#star4{top:228px;left:262px;}
#star5{top:228px;left:336px;}

#star6{top:303px;left:40px;}
#star7{top:303px;left:114px;}
#star8{top:303px;left:188px;}
#star9{top:303px;left:262px;}
#star10{top:303px;left:336px;}

</style>
</head>

<body>

<div class="ticket">

<img src="loto.png">

<div class="scratch s1"></div>
<div class="scratch s2"></div>
<div class="scratch s3"></div>
<div class="scratch s4"></div>
<div class="scratch s5"></div>

<div class="scratch s6"></div>
<div class="scratch s7"></div>
<div class="scratch s8"></div>
<div class="scratch s9"></div>
<div class="scratch s10"></div>

<div class="star" id="star1">⭐</div>
<div class="star" id="star2">⭐</div>
<div class="star" id="star3">⭐</div>
<div class="star" id="star4">⭐</div>
<div class="star" id="star5">⭐</div>

<div class="star" id="star6">⭐</div>
<div class="star" id="star7">⭐</div>
<div class="star" id="star8">⭐</div>
<div class="star" id="star9">⭐</div>
<div class="star" id="star10">⭐</div>

<div class="result" id="result"></div>
<div class="wintext" id="wintext">ԴՈՒՔ ՀԱՂԹԵԼ ԵՔ</div>

</div>

<script>

const prizes = [
{stars:10, prize:"50.000 ԴՐԱՄ"},
{stars:9, prize:"40.000 ԴՐԱՄ"},
{stars:8, prize:"30.000 ԴՐԱՄ"},
{stars:7, prize:"20.000 ԴՐԱՄ"},
{stars:6, prize:"10.000 ԴՐԱՄ"},
{stars:5, prize:"5.000 ԴՐԱՄ"},
{stars:4, prize:"2.000 ԴՐԱՄ"},
{stars:3, prize:"1.000 ԴՐԱՄ"},
{stars:2, prize:"500 ԴՐԱՄ"},
{stars:1, prize:"100 ԴՐԱՄ"},
{stars:0, prize:"0"}
];

const random = Math.random();

let result;

if(random < 0.70){

    const smallWins = [1,2,3,4,5,6,7,8];
    const stars = smallWins[Math.floor(Math.random()*smallWins.length)];

    result = prizes.find(p => p.stars === stars);

}else if(random < 0.85){

    result = prizes.find(p => p.stars === 0);

}else if(random < 0.95){

    result = prizes.find(p => p.stars === 9);

}else{

    result = prizes.find(p => p.stars === 10);
}

const starPositions = [];

for(let i=1;i<=10;i++){
    starPositions.push(i);
}

starPositions.sort(() => Math.random()-0.5);

for(let i=0;i<result.stars;i++){

    const star = document.getElementById(
        "star"+starPositions[i]
    );

    star.style.display = "block";
}

document.querySelectorAll('.scratch').forEach(el=>{

    el.addEventListener('touchstart', scratch);
    el.addEventListener('mousedown', scratch);

    function scratch(){

        el.style.opacity = "0";

        setTimeout(()=>{

            document.getElementById('result').style.display='block';
            document.getElementById('result').innerHTML=result.prize;

            if(result.stars > 0){
                document.getElementById('wintext').style.display='block';
            }

        },500);
    }

});

</script>

</body>
</html>
